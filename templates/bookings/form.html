{% extends "base.html" %}
{% block title %}Book Event | Nexus Events{% endblock %}
{% block content %}
<div class="booking-info">
<h1>Booking / Inquiry</h1>
<p>Fill in the form below and our team will reach out shortly.</p>
</div>
<form class="booking-form" method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Submit Booking</button>
</form>
{% endblock %}
